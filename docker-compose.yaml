services:
  docmost:
    image: docmost/docmost:latest
    container_name: docmost
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    expose:
      - "3000"
    restart: unless-stopped
    volumes:
      - docmost_data:/app/data/storage
    networks:
      - docmost_network
      - web-gateway # Jembatan agar bisa diakses oleh Caddy Pusat

  db:
    image: postgres:16-alpine
    container_name: docmost-db
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docmost"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - docmost_network

  redis:
    image: redis:7-alpine
    container_name: docmost-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - docmost_network

networks:
  # Network internal khusus docmost
  docmost_network:
    driver: bridge
  # Network bersama untuk reverse proxy
  web-gateway:
    external: true

volumes:
  docmost_data:
  db_data:
  redis_data: